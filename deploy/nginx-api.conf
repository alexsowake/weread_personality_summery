# /etc/nginx/sites-available/api.aicw.me
# After saving: ln -s /etc/nginx/sites-available/api.aicw.me /etc/nginx/sites-enabled/
# Then:        nginx -t && systemctl reload nginx
#
# HTTPS block is added automatically by `certbot --nginx -d api.aicw.me`.

server {
    listen 80;
    listen [::]:80;
    server_name api.aicw.me;

    # Lets certbot solve ACME challenges before we add the 443 block.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.aicw.me;

    # ssl_certificate / ssl_certificate_key — certbot will fill these in.

    # Block search engines and rule out HTML rendering by mistake.
    add_header X-Robots-Tag "noindex, nofollow" always;

    # === SSE-safe reverse proxy ===
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # CRITICAL for Server-Sent Events: never buffer or compress the stream.
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        gzip off;
        chunked_transfer_encoding on;

        # DeepSeek Pro streaming runs ~60s; allow generous margins.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
